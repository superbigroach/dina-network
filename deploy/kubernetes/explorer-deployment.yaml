# =============================================================================
# Dina Network — Block Explorer Deployment
#
# Serves the block explorer web UI that lets users browse blocks, transactions,
# accounts, and contract state on the Dina network.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dina-explorer
  namespace: dina-network
  labels:
    app.kubernetes.io/name: dina-explorer
    app.kubernetes.io/component: explorer
    app.kubernetes.io/part-of: dina
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dina-explorer
      app.kubernetes.io/component: explorer

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app.kubernetes.io/name: dina-explorer
        app.kubernetes.io/component: explorer
        app.kubernetes.io/part-of: dina
    spec:
      containers:
        - name: dina-explorer
          image: gcr.io/PROJECT_ID/dina-explorer:latest
          imagePullPolicy: Always

          env:
            # Point the explorer at the internal RPC service
            - name: DINA_RPC_URL
              value: "http://dina-rpc.dina-network.svc.cluster.local:8545"
            - name: DINA_REST_URL
              value: "http://dina-rpc.dina-network.svc.cluster.local:8080"
            - name: DINA_CHAIN_ID
              valueFrom:
                configMapKeyRef:
                  name: dina-config
                  key: CHAIN_ID
            - name: DINA_EXPLORER_PORT
              value: "3000"

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: dina-explorer
  namespace: dina-network
  labels:
    app.kubernetes.io/name: dina-explorer
    app.kubernetes.io/component: explorer
    app.kubernetes.io/part-of: dina
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dina-explorer
    app.kubernetes.io/component: explorer
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
